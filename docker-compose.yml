version: "3.9"

services:
  # === Database ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hawzhin
      POSTGRES_DB: quran_ai
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    ports:
      # Internal-only service: bind to loopback so it is reachable on the host (debugging, psql,
      # migrations) but NOT from other machines. Only platform-api (8080), the realtime gateway
      # (8081), and the web app are meant to be exposed off-host; postgres/ml/asr stay private.
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/0001_core_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./infra/sql/0002_seed_fatihah.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./infra/sql/0003_tenant_rls.sql:/docker-entrypoint-initdb.d/03_rls.sql:ro
      - ./infra/sql/0004_add_password_hash.sql:/docker-entrypoint-initdb.d/04_password.sql:ro
      - ./infra/sql/0005_learner_progress.sql:/docker-entrypoint-initdb.d/05_learner_progress.sql:ro
      - ./infra/sql/0007_seed_surah_names.sql:/docker-entrypoint-initdb.d/06_seed_surah_names.sql:ro
      - ./infra/sql/0008_session_language.sql:/docker-entrypoint-initdb.d/07_session_language.sql:ro
      - ./infra/sql/0006_seed_internal.sql:/docker-entrypoint-initdb.d/08_seed_internal.sql:ro
      - ./infra/sql/0009_learner_progress_rls.sql:/docker-entrypoint-initdb.d/09_learner_progress_rls.sql:ro
      - ./infra/sql/0010_review_status_check.sql:/docker-entrypoint-initdb.d/10_review_status_check.sql:ro
      - ./infra/sql/0011_teacher_review_required_status.sql:/docker-entrypoint-initdb.d/11_teacher_review_required_status.sql:ro
      - ./infra/sql/0012_superuser_only_rls_bypass.sql:/docker-entrypoint-initdb.d/12_superuser_only_rls_bypass.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hawzhin -d quran_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Rust Platform API ===
  platform-api:
    build:
      context: .
      dockerfile: services/platform-api/Dockerfile
    environment:
      DATABASE_URL: "postgresql://hawzhin:${POSTGRES_PASSWORD}@postgres:5432/quran_ai"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required in production}"
      REALTIME_GATEWAY_TICKET_SECRET: "${REALTIME_GATEWAY_TICKET_SECRET:?REALTIME_GATEWAY_TICKET_SECRET is required in production}"
      PLATFORM_API_BIND: "0.0.0.0:8080"
      ML_API_KEY: "${ML_API_KEY:?ML_API_KEY is required}"
      ASR_API_KEY: "${ASR_API_KEY:?ASR_API_KEY is required}"
      ALLOW_INSECURE_DEFAULTS: "${ALLOW_INSECURE_DEFAULTS:-0}"
      ML_INFERENCE_URL: "http://ml-inference:8090"
      ASR_INFERENCE_URL: "http://asr-inference:8091"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === Rust Realtime Gateway ===
  realtime-gateway:
    build:
      context: .
      dockerfile: services/realtime-gateway/Dockerfile
    environment:
      REALTIME_GATEWAY_BIND: "0.0.0.0:8081"
      REALTIME_GATEWAY_TICKET_SECRET: "${REALTIME_GATEWAY_TICKET_SECRET:?REALTIME_GATEWAY_TICKET_SECRET is required in production}"
      ML_INFERENCE_URL: "http://ml-inference:8090"
      GATEWAY_TENANT_ID: "hikmah-pilot-erbil"
      ML_API_KEY: "${ML_API_KEY:?ML_API_KEY is required}"
      ALLOW_INSECURE_DEFAULTS: "${ALLOW_INSECURE_DEFAULTS:-0}"
    ports:
      - "8081:8081"
    depends_on:
      platform-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === ML Inference (Node.js) ===
  ml-inference:
    build:
      context: .
      dockerfile: services/ml-inference/Dockerfile
    environment:
      ML_INFERENCE_PORT: "8090"
      ASR_SERVICE_URL: "http://asr-inference:8091"
      ASR_API_KEY: "${ASR_API_KEY:?ASR_API_KEY is required}"
      AUDIO_STORAGE_DIR: "/data/audio-storage"
      ML_API_KEY: "${ML_API_KEY:?ML_API_KEY is required}"
    ports:
      # Internal-only: loopback bind. The browser/mobile never hit ML directly — platform-api proxies
      # it with the server-side x-ml-api-key. Not exposed off-host.
      - "127.0.0.1:8090:8090"
    volumes:
      - audio_storage:/data/audio-storage
    depends_on:
      asr-inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === ASR Inference (Python/Whisper) ===
  asr-inference:
    build:
      context: .
      dockerfile: services/asr-inference/Dockerfile
    environment:
      ASR_PORT: "8091"
      ASR_MODEL: "base"
      ASR_API_KEY: "${ASR_API_KEY:?ASR_API_KEY is required}"
    ports:
      # Internal-only: loopback bind. Reached only server-side via the platform-api ASR proxy
      # (server-side x-asr-api-key) and ml-inference. Not exposed off-host.
      - "127.0.0.1:8091:8091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # === Web Frontend ===
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:8080"
    depends_on:
      platform-api:
        condition: service_healthy
      realtime-gateway:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  audio_storage:
