# TLS variant of nginx.conf (T12) — mounted over /etc/nginx/conf.d/default.conf by
# docker-compose.tls.yml. The plain-HTTP nginx.conf stays the default so nothing about the existing
# stack changes unless you opt in with the TLS override.
#
# WHY TLS IS NOT OPTIONAL FOR THIS PRODUCT: getUserMedia is disabled on insecure origins. Served
# over plain HTTP to anything but localhost, the app literally cannot open the microphone — so a
# recitation pilot on classroom laptops is impossible without this. The 80->443 redirect below is
# the feature, not a nicety.
#
# PORTS: nginxinc/nginx-unprivileged runs as UID 101 and cannot bind privileged ports, so it listens
# on 8080/8443 and the compose override maps host 80->8080 and 443->8443.

# --- Plain HTTP: redirect everything to HTTPS -------------------------------------------------
server {
    listen 8080;
    server_name _;
    # 301 (not 302): permanent, so browsers stop trying the insecure origin at all.
    return 301 https://$host$request_uri;
}

# --- HTTPS: serve the app and proxy the API + gateway on the SAME origin ----------------------
server {
    listen 8443 ssl;
    http2 on;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/tls/cert.pem;
    ssl_certificate_key /etc/nginx/tls/key.pem;
    # TLS1.2 floor: 1.0/1.1 are deprecated and rejected by modern browsers anyway.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS lives ONLY here, never on the HTTP server above: on a plain-HTTP response it is ignored
    # by browsers, so advertising it there would be theatre. `always` so it is sent on errors too.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Same baseline headers as the HTTP config (see nginx.conf for the rationale on each).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # CSP: TIGHTER than the plain-HTTP deployment's. There, the app talked directly to the API
    # (:8080) and gateway (:8081) — different origins — so connect-src needed the broad `ws: wss:`
    # scheme-sources. Here BOTH are proxied through this origin, so 'self' covers the fetches AND
    # the same-origin wss:// upgrade, and the wildcard schemes are dropped entirely.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self' blob: https://cdn.islamic.network; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # platform-api expects /v1/... — proxy_pass WITHOUT a trailing slash so the original URI passes
    # through unchanged.
    location /v1/ {
        proxy_pass http://platform-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Realtime gateway over wss:// on this origin. The trailing slash on proxy_pass is REQUIRED and
    # easy to get wrong: without it nginx forwards the matched prefix too, so the gateway would
    # receive /ws/v1/recitation-sessions/... and 404. With it, /ws/ is stripped and the gateway sees
    # the /v1/... route it actually serves. (The dormant block in nginx.conf omits the slash — it
    # was never exercised because that deployment exposes :8081 directly.)
    location /ws/ {
        proxy_pass http://realtime-gateway:8081/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        # A recitation WebSocket is idle between chunks; nginx's 60s default would cut a learner off
        # mid-session. The gateway's own ticket TTL (300s) is the real session bound.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # NOTE: fronting the gateway means every connection now arrives from nginx's address, which
        # would collapse tower_governor's per-client rate limit into ONE shared bucket. The compose
        # override therefore sets TRUST_PROXY_HEADERS=1 on the gateway so it keys off X-Real-IP
        # (set above) instead. That pairing is mandatory — see the same warning in nginx.conf.
    }
}
