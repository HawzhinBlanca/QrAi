server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (deployment-independent, non-breaking). `always` so they are sent on
    # error responses too. Set at the server level; the location blocks below add no headers of their
    # own, so nginx propagates these to every response (add_header does NOT inherit into a block that
    # defines its own).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Content-Security-Policy — full restrictive policy for this deployment. API calls go through
    # the nginx proxy (/v1/ -> platform-api; see apps/web/src/data/*.ts's relative-path fetches
    # in production), so connect-src only needs 'self' plus ws:/wss: for the realtime gateway
    # WebSocket (VITE_REALTIME_GATEWAY_URL currently connects directly to :8081, a different
    # origin than this page — ws:/wss: as scheme-sources cover that, not just same-origin).
    # style-src needs 'unsafe-inline' for React's dynamic inline styles (mastery ring, accuracy
    # ring, audio visualizer bars). script-src does NOT include 'unsafe-inline'/'unsafe-eval'.
    # media-src allows cdn.islamic.network for reference recitation audio.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; media-src 'self' blob: https://cdn.islamic.network; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /v1/ {
        proxy_pass http://platform-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://realtime-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # NOTE: the current docker-compose.yml deployment does NOT route through this block — it
        # exposes the gateway's own port directly (VITE_REALTIME_GATEWAY_URL=ws://localhost:8081),
        # so this location is currently unused/dormant. If a future deployment DOES front the
        # gateway through this proxy: by default tower_governor's rate limiter keys on the raw TCP
        # peer address of the connection it receives — which would be nginx's own address for every
        # request, not the real client's, collapsing per-client rate limiting into one shared bucket
        # for every user behind this proxy. The gateway already supports reading X-Real-IP via
        # tower_governor's SmartIpKeyExtractor (services/realtime-gateway/src/lib.rs); that
        # deployment would just need to set TRUST_PROXY_HEADERS=1 on the gateway to opt in.
    }
}
