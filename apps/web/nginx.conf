server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (deployment-independent, non-breaking). `always` so they are sent on
    # error responses too. Set at the server level; the location blocks below add no headers of their
    # own, so nginx propagates these to every response (add_header does NOT inherit into a block that
    # defines its own).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Content-Security-Policy — full restrictive policy for the containerized deployment.
    # In Docker compose, API calls go through the nginx proxy (/v1/ → platform-api, /ws/ →
    # realtime-gateway), so connect-src only needs 'self' + ws:/wss: for WebSocket upgrades.
    # Fonts (Inter, Amiri) are bundled by Vite (no external CDN). React uses inline styles for
    # 3 dynamic components (mastery ring, accuracy ring, audio visualizer bars), requiring
    # 'unsafe-inline' in style-src. script-src does NOT include 'unsafe-inline' or 'unsafe-eval'.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws: wss:; media-src 'self' blob: https://cdn.islamic.network; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /v1/ {
        proxy_pass http://platform-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://realtime-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
