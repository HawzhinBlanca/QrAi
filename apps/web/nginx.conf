server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers (deployment-independent, non-breaking). `always` so they are sent on
    # error responses too. Set at the server level; the location blocks below add no headers of their
    # own, so nginx propagates these to every response (add_header does NOT inherit into a block that
    # defines its own).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self), camera=(), geolocation=()" always;

    # Content-Security-Policy — only the directives that CANNOT break the SPA are set here:
    # frame-ancestors (clickjacking), base-uri (base-tag injection), object-src (plugins/embeds),
    # form-action (form hijacking). The resource-loading directives (default-src / script-src /
    # style-src / connect-src) are deliberately NOT set: connect-src must enumerate this deployment's
    # platform-api + gateway origins and style-src needs 'unsafe-inline' for the motion library, so a
    # full policy is per-deployment config that must be tested against the running app.
    add_header Content-Security-Policy "frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /v1/ {
        proxy_pass http://platform-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://realtime-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
