# Builds every service image and asserts each runs as the non-root user. This is the CI verification
# for the Dockerfile / compose / .dockerignore hardening that cannot be built locally without a Docker
# daemon. Runs only when those files change (image builds are slow), plus on main.
name: docker-build
on:
  pull_request:
    paths:
      - "services/*/Dockerfile"
      - "apps/web/Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"
  push:
    branches: [main]
    paths:
      - "services/*/Dockerfile"
      - "apps/web/Dockerfile"
      - "docker-compose.yml"
      - ".dockerignore"
      - ".github/workflows/docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    # Dummy values ONLY to satisfy the compose ${VAR:?required} interpolation at build/parse time.
    # `docker compose build` does not inject runtime env into images, so these never ship anywhere.
    env:
      JWT_SECRET: "ci-dummy-jwt-secret-at-least-32-characters-long"
      REALTIME_GATEWAY_TICKET_SECRET: "ci-dummy-ticket-secret-at-least-32-chars"
      ML_API_KEY: "ci-dummy-ml-key"
      ASR_API_KEY: "ci-dummy-asr-key"
      POSTGRES_PASSWORD: "ci-dummy-pg"
    steps:
      - uses: actions/checkout@v4

      # Build all images — fails if any Dockerfile (incl. the non-root RUN steps and the .dockerignore
      # context) does not build. This is what could not be verified without a local Docker daemon.
      - name: docker compose build
        run: docker compose build

      # Assert every service image runs as a non-root user. Backend services use appuser (uid 10001);
      # web uses nginxinc/nginx-unprivileged which defaults to uid 101. Overrides the entrypoint to
      # print the effective uid; --no-deps so it doesn't start Postgres/other services.
      - name: Assert containers run as non-root
        run: |
          set -euo pipefail
          fail=0
          for svc in platform-api realtime-gateway ml-inference asr-inference; do
            uid=$(docker compose run --rm --no-deps --entrypoint sh "$svc" -c 'id -u' | tr -d '\r')
            echo "$svc -> uid $uid"
            if [ "$uid" != "10001" ]; then
              echo "::error::$svc is not running as the non-root uid 10001 (got '$uid')"
              fail=1
            fi
          done
          # web uses nginxinc/nginx-unprivileged (uid 101), not appuser.
          uid=$(docker compose run --rm --no-deps --entrypoint sh web -c 'id -u' | tr -d '\r')
          echo "web -> uid $uid"
          if [ "$uid" = "0" ]; then
            echo "::error::web is running as root (uid 0)"
            fail=1
          fi
          exit $fail

      # Vulnerability scan: report HIGH/CRITICAL CVEs in all images. Report-only (continue-on-error)
      # so upstream base-image CVEs don't block PRs, but the report is uploaded for review.
      - name: Scan images for vulnerabilities (trivy)
        continue-on-error: true
        run: |
          # Install trivy from the official deb repo
          sudo apt-get update -qq
          sudo apt-get install -y -qq wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y -qq trivy

          mkdir -p /tmp/trivy-reports
          for svc in platform-api realtime-gateway ml-inference asr-inference web; do
            img=$(docker compose images "$svc" --format '{{.Repository}}:{{.Tag}}' 2>/dev/null | head -1)
            if [ -n "$img" ] && [ "$img" != ":" ]; then
              echo "==> Scanning $svc ($img)"
              trivy image --severity HIGH,CRITICAL --format table "$img" | tee "/tmp/trivy-reports/${svc}.txt" || true
            else
              echo "==> Skipping $svc (no image found)"
            fi
          done
          echo "Vulnerability scan complete (report-only)"

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: /tmp/trivy-reports/
          retention-days: 14
