name: ci
on:
  pull_request:
  push: { branches: [main] }

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hawzhin
          POSTGRES_DB: quran_ai
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hawzhin -d quran_ai"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://hawzhin@localhost:5432/quran_ai"
      ALLOW_INSECURE_DEFAULTS: "1"

    steps:
      - uses: actions/checkout@v4

      # --- Toolchains ---
      - uses: pnpm/action-setup@v4          # version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            services/realtime-gateway
            services/platform-api

      # --- Bootstrap ---
      - run: pnpm install --frozen-lockfile

      # --- Assert no missing SQL migrations in CI list ---
      - name: Assert no missing SQL migrations in CI list
        run: |
          expected_count=$(ls infra/sql/*.sql | wc -l | tr -d ' ')
          actual_count=21
          if [ "$expected_count" != "$actual_count" ]; then
            echo "::error::Migration file count mismatch! Expected $actual_count migration files in infra/sql, found $expected_count. Update ci.yml."
            exit 1
          fi

      # --- Seed Postgres with migrations ---
      - name: Apply SQL migrations
        run: |
          for sql in \
            infra/sql/0001_core_schema.sql \
            infra/sql/0002_seed_fatihah.sql \
            infra/sql/0003_tenant_rls.sql \
            infra/sql/0004_add_password_hash.sql \
            infra/sql/0005_learner_progress.sql \
            infra/sql/0007_seed_surah_names.sql \
            infra/sql/0008_session_language.sql \
            infra/sql/0006_seed_internal.sql \
            infra/sql/0009_learner_progress_rls.sql \
            infra/sql/0010_review_status_check.sql \
            infra/sql/0011_teacher_review_required_status.sql \
            infra/sql/0012_superuser_only_rls_bypass.sql \
            infra/sql/0013_unique_email_per_tenant.sql \
            infra/sql/0015_teacher_review_scholar_approval_indexes.sql \
            infra/sql/0016_missing_tenant_indexes.sql \
            infra/sql/0017_eval_runs_index.sql \
            infra/sql/0018_agent_run_learner_id.sql \
            infra/sql/0019_recitation_and_findings_sort_indexes.sql \
            infra/sql/0020_language_check.sql \
            infra/sql/0021_pilot_identity.sql; do
            echo "Applying $sql..."
            psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$sql"
          done
          echo "Applying rls-app-role.sql..."
          psql "$DATABASE_URL" -v app_password="ci-dummy-password" -f infra/sql/rls-app-role.sql

      # --- Seed the full Quran (canonical_ayahs/words for all 114 surahs) so integration
      #     tests like gets_quran_surah_list_from_postgres (expects >= 114) hold in CI. The
      #     migrations above seed only surah NAMES (0007) + Al-Fatihah ayahs (0002). Uses the
      #     psql-based seed (no `pg` dep); its defaults (localhost/hawzhin/quran_ai) match the
      #     postgres service, only PSQL needs the ubuntu path. ---
      - name: Seed full Quran
        run: PSQL=psql bash packages/quran-data/scripts/seed-full-quran-to-db.sh

      # --- Run dependency vulnerability scan ---
      - name: Dependency vulnerability scan
        run: pnpm audit

      # --- The CODYSTEM gate (same script the agent runs locally) ---
      - run: bash scripts/verify.sh

      # --- Lightweight CI smoke: start platform-api and hit /health ---
      - name: CI smoke test
        run: |
          cargo build --manifest-path services/platform-api/Cargo.toml --release 2>/dev/null
          services/platform-api/target/release/quran-ai-platform-api &
          API_PID=$!
          sleep 3
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/health || true)
          kill $API_PID 2>/dev/null || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "CI smoke failed: /health returned $HTTP_CODE"
            exit 1
          fi
          echo "CI smoke passed: /health returned 200"
