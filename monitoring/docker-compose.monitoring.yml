# Optional monitoring stack (P5.5). Run alongside the app from the repo root:
#   docker compose -f docker-compose.yml -f monitoring/docker-compose.monitoring.yml up -d prometheus grafana
# Prometheus scrapes platform-api /metrics (token-gated) and evaluates monitoring/alerts.yml; Grafana
# visualizes it. Both are loopback-published (internal ops tools) like postgres/ml/asr.
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      platform-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/qrai.json:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
